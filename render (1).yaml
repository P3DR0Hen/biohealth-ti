services:
  # ── Backend API ───────────────────────────────────────────
  - type: web
    name: biohealth-ti-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biohealth-ti-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: ADMIN_EMAIL
        value: admin@biohealth.com.br
      - key: ADMIN_SENHA
        value: admin123
      - key: ADMIN_NOME
        value: Admin TI

  # ── Frontend estático ─────────────────────────────────────
  - type: web
    name: biohealth-ti-frontend
    runtime: static
    staticPublishPath: ../frontend
    routes:
      - type: rewrite
        source: /*
        destination: /login.html

databases:
  - name: biohealth-ti-db
    databaseName: biohealth_ti
    user: biohealth
    plan: free
